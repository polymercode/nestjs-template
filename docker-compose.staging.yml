services:
  db:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env.staging
    # No `ports:` — db is reachable only from other containers on the compose
    # network (app connects via `db:5432`), never from the host/outside world.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nestjs_template']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: always
    # No `ports:` — same reasoning as db, internal-network only.
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'

volumes:
  pgdata:
  redisdata:
